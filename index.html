<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>바코드 매칭기</title>
<!-- iOS Safari 디코더 (Android는 네이티브 BarcodeDetector 사용) -->
<script src="https://cdn.jsdelivr.net/npm/zxing-wasm@3.0.3/dist/iife/reader/index.js"></script>
<style>
:root{
  --bg:#f0f4f8;--surface:#fff;--surface2:#f7f9fc;--border:#e3e8ef;
  --text:#1a202c;--text2:#5a6a7e;--text3:#9aacbe;
  --accent:#7c3aed;--accent-bg:#f5f3ff;
  --green:#16a34a;--green-bg:#f0fdf4;
  --red:#dc2626;--red-bg:#fef2f2;
  --yellow:#ca8a04;
  --radius:14px;--radius-sm:9px;
  --mono:'JetBrains Mono',ui-monospace,monospace;--sans:'Noto Sans KR','Segoe UI',sans-serif;
}
*{box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--text);margin:0 auto;max-width:480px;min-height:100vh;padding-bottom:80px}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px}
.title{font-weight:800;font-size:16px;flex:1}
.count-pill{font-size:11px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 10px;font-weight:600}
.icon-btn{width:34px;height:34px;border:1px solid var(--border);background:var(--surface);border-radius:9px;cursor:pointer;font-size:15px}
.wrap{padding:16px}

/* tabs */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:60px;z-index:90}
.tab{flex:1;padding:11px 0;font-size:13px;font-weight:600;font-family:var(--sans);border:none;background:transparent;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:var(--accent);border-color:var(--accent)}
.tab .badge{display:inline-block;min-width:16px;font-size:10px;background:var(--red);color:#fff;border-radius:10px;padding:1px 5px;margin-left:4px}

.page{display:none}.page.show{display:block}

/* scan */
.scan-btn{width:100%;padding:22px;background:var(--surface);border:2px dashed var(--accent);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;color:var(--accent);font-weight:700;font-size:15px}
.scan-btn .big{font-size:34px}
.manual-row{display:flex;gap:8px;margin-top:12px}
.manual-row input{flex:1;padding:12px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:var(--mono);outline:none;background:var(--surface);color:var(--text)}
.manual-row input:focus{border-color:var(--accent)}
.manual-row button{padding:0 18px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-weight:700;cursor:pointer;font-size:14px}

/* result card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:16px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.card.matched{border-color:var(--green)}
.card.unmatched{border-color:var(--yellow)}
.card-bc{font-family:var(--mono);font-size:13px;color:var(--text2);word-break:break-all}
.card-status{font-size:12px;font-weight:700;margin:6px 0 12px;display:flex;align-items:center;gap:6px}
.card-status.ok{color:var(--green)}.card-status.warn{color:var(--yellow)}
.name-input{width:100%;padding:12px;border:2px solid var(--accent);border-radius:var(--radius-sm);font-size:15px;font-weight:600;font-family:var(--sans);outline:none;background:var(--surface);color:var(--text)}
.row-btns{display:flex;gap:8px;margin-top:12px}
.btn{flex:1;padding:12px;border:none;border-radius:var(--radius-sm);font-weight:700;font-size:14px;cursor:pointer;font-family:var(--sans)}
.btn.primary{background:var(--accent);color:#fff}
.btn.ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn.danger{background:var(--red-bg);color:var(--red)}
.suggest{margin-top:10px}
.suggest-item{padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-top:6px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:13px}
.suggest-item:active{background:var(--accent-bg)}
.muted{color:var(--text3);font-size:12px}

/* list */
.search{width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:13px;outline:none;background:var(--surface);color:var(--text);margin-bottom:12px;font-family:var(--sans)}
.item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.item .nm{font-size:14px;font-weight:600}
.item .bc{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:2px;word-break:break-all}
.item .extra{font-size:10px;color:var(--accent);margin-top:2px}
.item-acts{display:flex;gap:6px;flex-shrink:0}
.mini{width:30px;height:30px;border:1px solid var(--border);background:var(--surface);border-radius:7px;cursor:pointer;font-size:13px}
.empty{text-align:center;color:var(--text3);padding:40px 16px;font-size:13px}

/* queue */
.q-item{background:var(--surface);border:1px solid var(--yellow);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.q-item .bc{font-family:var(--mono);font-size:13px;font-weight:600}
.q-item .tm{font-size:10px;color:var(--text3);margin-top:2px}

/* camera */
.camera-wrap{display:none;position:fixed;inset:0;background:#000;z-index:200;flex-direction:column}
.camera-wrap.open{display:flex}
#scanner-video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.scan-ui{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.scan-frame{width:270px;height:150px;border:2px solid rgba(255,255,255,.7);border-radius:12px;position:relative;box-shadow:0 0 0 9999px rgba(0,0,0,.55)}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#7c3aed,transparent);animation:sl 1.8s linear infinite}
@keyframes sl{0%{top:0}100%{top:100%}}
.corner{position:absolute;width:18px;height:18px;border-color:#7c3aed;border-style:solid;border-width:0}
.corner.tl{top:-2px;left:-2px;border-top-width:3px;border-left-width:3px;border-radius:4px 0 0 0}
.corner.tr{top:-2px;right:-2px;border-top-width:3px;border-right-width:3px;border-radius:0 4px 0 0}
.corner.bl{bottom:-2px;left:-2px;border-bottom-width:3px;border-left-width:3px;border-radius:0 0 0 4px}
.corner.br{bottom:-2px;right:-2px;border-bottom-width:3px;border-right-width:3px;border-radius:0 0 4px 0}
.scan-hint{color:rgba(255,255,255,.85);font-size:13px;margin-top:22px}
.cam-close{position:absolute;top:20px;right:20px;width:40px;height:40px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.2);border-radius:50%;color:#fff;font-size:20px;cursor:pointer;z-index:10;pointer-events:all}
#zoom-control{display:none;position:absolute;left:24px;right:24px;bottom:16px;align-items:center;gap:12px;z-index:5}
#zoom-control span{color:#fff;font-size:20px;font-weight:800;text-shadow:0 1px 4px rgba(0,0,0,.7)}
#zoom-slider{flex:1;height:30px;accent-color:#7c3aed}

/* toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--text);color:#fff;padding:11px 20px;border-radius:30px;font-size:13px;opacity:0;transition:all .25s;z-index:999;pointer-events:none;white-space:nowrap;max-width:calc(100% - 32px)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--green)}.toast.err{background:var(--red)}.toast.warn{background:var(--yellow)}

/* menu sheet */
.sheet-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300}
.sheet-mask.open{display:block}
.sheet{position:absolute;left:0;right:0;bottom:0;background:var(--surface);border-radius:18px 18px 0 0;padding:18px;max-width:480px;margin:0 auto}
.sheet h3{margin:0 0 14px;font-size:15px}
.sheet-btn{width:100%;padding:13px;border:1px solid var(--border);background:var(--surface2);border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px;text-align:left;font-family:var(--sans);color:var(--text)}
.sheet-btn small{display:block;color:var(--text3);font-weight:400;font-size:11px;margin-top:2px}
</style>
</head>
<body>

<div class="header">
  <div class="logo">🏷️</div>
  <div class="title">바코드 매칭기</div>
  <div class="count-pill" id="count-pill">0건</div>
  <button class="icon-btn" onclick="openMenu()">⋯</button>
</div>

<div class="tabs">
  <button class="tab active" id="tab-scan" onclick="goTab('scan')">매칭</button>
  <button class="tab" id="tab-list" onclick="goTab('list')">목록</button>
  <button class="tab" id="tab-queue" onclick="goTab('queue')">미매칭<span class="badge" id="q-badge" style="display:none">0</span></button>
</div>

<!-- 매칭 -->
<div class="page show" id="page-scan">
  <div class="wrap">
    <button class="scan-btn" onclick="openCam()">
      <span class="big">📷</span>
      <span>바코드 스캔</span>
    </button>
    <div class="manual-row">
      <input id="manual" placeholder="또는 바코드 직접 입력" inputmode="numeric"
        onkeydown="if(event.key==='Enter')handleManual()">
      <button onclick="handleManual()">확인</button>
    </div>
    <div id="result"></div>
  </div>
</div>

<!-- 목록 -->
<div class="page" id="page-list">
  <div class="wrap">
    <input class="search" id="list-search" placeholder="🔍 제품명 / 바코드 검색" oninput="renderList()">
    <div id="list-body"></div>
  </div>
</div>

<!-- 미매칭 큐 -->
<div class="page" id="page-queue">
  <div class="wrap">
    <p class="muted">스캔했지만 아직 이름을 안 붙인 바코드입니다. 탭하면 매칭 화면으로 갑니다.</p>
    <div id="queue-body"></div>
  </div>
</div>

<!-- Camera -->
<div class="camera-wrap" id="camWrap">
  <video id="scanner-video" autoplay playsinline muted></video>
  <div class="scan-ui">
    <div class="scan-frame">
      <div class="scan-line"></div>
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
    </div>
    <div class="scan-hint">바코드를 프레임 안에 맞춰주세요</div>
  </div>
  <div id="zoom-control"><span>−</span><input id="zoom-slider" type="range" min="1" max="5" step="0.1" value="1"><span>＋</span></div>
  <button class="cam-close" onclick="closeCam()">✕</button>
</div>

<!-- Menu sheet -->
<div class="sheet-mask" id="menu-mask" onclick="if(event.target===this)closeMenu()">
  <div class="sheet">
    <h3>데이터 / 백데이터</h3>
    <button class="sheet-btn" onclick="exportJSON()">📤 JSON 내보내기<small>다른 프로그램에서 쓸 마스터 백데이터</small></button>
    <button class="sheet-btn" onclick="exportCSV()">📊 CSV 내보내기<small>엑셀/구글시트용</small></button>
    <button class="sheet-btn" onclick="document.getElementById('import-file').click()">📥 JSON 가져오기 / 병합<small>기존 마스터에 합치기</small></button>
    <button class="sheet-btn" onclick="loadSheet();closeMenu();">🔄 jaego중앙 새로고침<small>창고재고 시트 최신 제품목록 다시 읽기</small></button>
    <button class="sheet-btn danger" style="color:var(--red)" onclick="wipeAll()">🗑️ 전체 삭제</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importJSON(this.files[0])">
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 재사용 모듈 (개발용: 분리 로드. 배포 시 build.py가 난독화하여 인라인) -->

<script>
// ═══════════════════════════════════════
// 마스터 데이터 (포터블 백데이터)
//   master[key] = { name, extra:[다른바코드들], updatedAt }
//   key = 정규화된 대표 바코드
// ═══════════════════════════════════════
const LS_MASTER = 'bm_master';
const LS_QUEUE  = 'bm_queue';
const LS_SHEET  = 'bm_sheet';
// jaego중앙 시트(창고재고 워커) — 시작 시 자동으로 백데이터로 읽어온다.
const SHEET_URL = 'https://pharmacy-proxy.asteria2hyun.workers.dev';
let master = JSON.parse(localStorage.getItem(LS_MASTER) || '{}');
let queue  = JSON.parse(localStorage.getItem(LS_QUEUE)  || '[]');
let sheetProducts = JSON.parse(localStorage.getItem(LS_SHEET) || '[]'); // jaego중앙 캐시
let sheetReady = false;
let scanner = null;
const U = window.BarcodeUtils;

function saveMaster(){ localStorage.setItem(LS_MASTER, JSON.stringify(master)); updateCounts(); }
function saveQueue(){ localStorage.setItem(LS_QUEUE, JSON.stringify(queue)); updateCounts(); }

function updateCounts(){
  const n = Object.keys(master).length;
  const s = sheetProducts.length;
  document.getElementById('count-pill').textContent = s ? `시트 ${s} · 내 ${n}` : (n + '건');
  const qb = document.getElementById('q-badge');
  const qn = queue.length + sheetNoBarcode().length;
  if(qn){ qb.style.display='inline-block'; qb.textContent = qn; }
  else qb.style.display='none';
}

// jaego중앙 자동 로드: 캐시 즉시 사용 → 백그라운드 getAll 갱신
async function loadSheet(){
  if(sheetProducts.length) sheetReady = true;
  updateCounts();
  try{
    const data = await jsonpFetch(SHEET_URL + '?action=getAll');
    if(data && data.success && Array.isArray(data.products)){
      sheetProducts = data.products;
      localStorage.setItem(LS_SHEET, JSON.stringify(sheetProducts));
      sheetReady = true;
      updateCounts();
      const cur = document.getElementById('list-search');
      if(document.getElementById('page-list').classList.contains('show')) renderList();
      if(document.getElementById('page-queue').classList.contains('show')) renderQueue();
      toast(`jaego중앙 연결됨 (${sheetProducts.length}개)`,'ok');
    }
  }catch(e){
    if(!sheetReady) toast('⚠ 시트 연결 실패 (오프라인/캐시 없음)','warn');
  }
}

// 시트에서 이름만 있고 바코드 없는 품목(=매칭 필요 대상)
function sheetNoBarcode(){
  return sheetProducts.filter(p => p.name && !(p.barcode && String(p.barcode).trim()));
}

// ── 조회: 직접 → 별칭 → 변형 → 뒷자리 ──
function lookup(raw){
  const norm = U.normalize(raw);
  if(master[norm]) return { key:norm, entry:master[norm], how:'direct' };

  // 별칭(extra) 또는 변형 매칭
  const vs = U.variants(raw);
  for(const key in master){
    const e = master[key];
    if(vs.includes(key)) return { key, entry:e, how:'variant' };
    if(e.extra && e.extra.some(x=>vs.includes(x))) return { key, entry:e, how:'alias' };
  }
  // ── jaego중앙 시트(백데이터) 직접/변형 매칭 ──
  for(const p of sheetProducts){
    if(!p.name) continue;
    const keys = [p.barcode, ...(p.extraBarcodes||[])].filter(Boolean).map(U.normalize);
    if(keys.includes(norm) || keys.some(k=>vs.includes(k)))
      return { key: U.normalize(p.barcode||norm), entry:{ name:p.name, extra:(p.extraBarcodes||[]) }, how:'direct', source:'sheet', product:p };
  }

  // 뒷자리 매칭 (앞자리 오인식 대응) — 이름이 유일할 때만 제안
  const t = U.tail(norm);
  if(t){
    const hits = [];
    for(const key in master){
      const e = master[key];
      const keys = [key, ...(e.extra||[])];
      if(keys.some(k=>U.tail(k)===t)) hits.push({key,entry:e});
    }
    const uniqNames = [...new Set(hits.map(h=>h.entry.name))];
    if(uniqNames.length===1) return { key:hits[0].key, entry:hits[0].entry, how:'tail' };
    // 시트 뒷자리
    const sHits = sheetProducts.filter(p=>{
      if(!p.name) return false;
      const keys=[p.barcode,...(p.extraBarcodes||[])].filter(Boolean);
      return keys.some(k=>U.tail(k)===t);
    });
    const sUniq = [...new Set(sHits.map(h=>h.name))];
    if(sUniq.length===1){ const p=sHits[0]; return { key:U.normalize(p.barcode||norm), entry:{name:p.name,extra:p.extraBarcodes||[]}, how:'tail', source:'sheet', product:p }; }
  }
  return null;
}

// ═══════════════════════════════════════
// 매칭 화면
// ═══════════════════════════════════════
let currentRaw = null, currentNorm = null;

function handleManual(){
  const v = document.getElementById('manual').value.trim();
  if(!v) return;
  document.getElementById('manual').value='';
  processBarcode(v);
}

let pendingTargetName = null;  // 95개 워크리스트에서 "이 제품에 바코드 연결" 대기 중인 이름
function startMatchFor(name){
  pendingTargetName = name;
  goTab('scan');
  document.getElementById('result').innerHTML =
    `<div class="card unmatched"><div class="card-status warn">📷 "${esc(name)}"에 연결할 바코드를 스캔/입력하세요</div>
     <button class="btn ghost" style="margin-top:8px" onclick="cancelTarget()">취소</button></div>`;
  openCam();
}
function cancelTarget(){ pendingTargetName=null; clearResult(); }

function processBarcode(raw){
  currentRaw = raw;
  currentNorm = U.normalize(raw);
  goTab('scan');
  if(pendingTargetName){               // 워크리스트에서 지정한 제품에 바코드 연결
    const nm = pendingTargetName; pendingTargetName = null;
    connectName(nm, currentNorm);
    return;
  }
  const hit = lookup(raw);
  if(hit && hit.how!=='tail'){
    renderMatched(hit);
  } else if(hit && hit.how==='tail'){
    renderTailSuggest(hit);
  } else {
    renderUnmatched();
  }
}

function renderMatched(hit){
  const el = document.getElementById('result');
  if(hit.source==='sheet'){
    // jaego중앙 시트에 이미 있는 제품 (읽기 전용 표시)
    el.innerHTML = `
      <div class="card matched">
        <div class="card-bc">${esc(currentNorm)}</div>
        <div class="card-status ok">✅ jaego중앙에 등록된 제품</div>
        <div style="font-size:17px;font-weight:700;margin:4px 0 2px">${esc(hit.entry.name)}</div>
        <div class="muted">시트 바코드: ${esc(hit.product&&hit.product.barcode||currentNorm)}</div>
        <button class="btn ghost" style="margin-top:12px" onclick="clearResult()">확인</button>
      </div>`;
    return;
  }
  el.innerHTML = `
    <div class="card matched">
      <div class="card-bc">${esc(currentNorm)}</div>
      <div class="card-status ok">✅ 이미 매칭됨 (내 마스터)</div>
      <input class="name-input" id="edit-name" value="${esc(hit.entry.name)}">
      ${currentNorm!==hit.key && !(hit.entry.extra||[]).includes(currentNorm) ?
        `<p class="muted" style="margin-top:8px">이 바코드(${esc(currentNorm)})를 이 제품의 별칭으로 추가할 수 있어요.</p>
         <button class="btn ghost" style="margin-top:6px" onclick="addAlias('${esc(hit.key)}','${esc(currentNorm)}')">+ 별칭 추가</button>` : ''}
      <div class="row-btns">
        <button class="btn primary" onclick="saveEdit('${esc(hit.key)}')">이름 저장</button>
        <button class="btn danger" onclick="removeEntry('${esc(hit.key)}')">삭제</button>
      </div>
    </div>`;
}

function renderTailSuggest(hit){
  const el = document.getElementById('result');
  const action = hit.source==='sheet'
    ? `connectName('${esc(hit.entry.name)}','${esc(currentNorm)}')`
    : `addAlias('${esc(hit.key)}','${esc(currentNorm)}')`;
  const note = hit.source==='sheet' ? ' (jaego중앙)' : '';
  el.innerHTML = `
    <div class="card unmatched">
      <div class="card-bc">${esc(currentNorm)}</div>
      <div class="card-status warn">⚠ 뒷자리가 같은 제품이 있어요${note} (앞자리 오인식?)</div>
      <div class="suggest-item" onclick="${action}">
        <div><b>${esc(hit.entry.name)}</b><div class="muted">${esc(hit.key)}</div></div>
        <span style="color:var(--accent);font-weight:700">이 제품으로</span>
      </div>
      <p class="muted" style="margin-top:12px">다른 제품이면 새로 등록하세요:</p>
      ${newFormHTML()}
    </div>`;
  focusName();
}

// 시트 제품명에 현재 바코드를 연결 → 내 마스터에 저장 (시트 쓰기는 다음 단계)
function connectName(name, bc){
  master[bc] = { name, extra:[], updatedAt: dateStr() };
  removeFromQueue(bc);
  saveMaster();
  toast('✅ 매칭 저장(내 마스터): '+name,'ok');
  clearResult();
}

function renderUnmatched(){
  const el = document.getElementById('result');
  el.innerHTML = `
    <div class="card unmatched">
      <div class="card-bc">${esc(currentNorm)}</div>
      <div class="card-status warn">🆕 미매칭 — 제품명을 입력하세요</div>
      ${newFormHTML()}
      <button class="btn ghost" style="margin-top:8px" onclick="addToQueue()">나중에 (미매칭 목록에 보관)</button>
    </div>`;
  focusName();
  renderNameSuggest('');
}

function newFormHTML(){
  return `
    <input class="name-input" id="new-name" placeholder="제품명" oninput="renderNameSuggest(this.value)">
    <div class="suggest" id="name-suggest"></div>
    <div class="row-btns"><button class="btn primary" onclick="saveNew()">매칭 저장</button></div>`;
}

// 입력 중 기존 제품명 자동완성 → 선택 시 별칭으로 연결
function renderNameSuggest(q){
  const box = document.getElementById('name-suggest'); if(!box) return;
  q = q.trim().toLowerCase();
  if(!q){ box.innerHTML=''; return; }
  const seen = new Set(); const hits=[];
  for(const key in master){
    const e = master[key];
    if(e.name && e.name.toLowerCase().includes(q) && !seen.has(e.name)){
      seen.add(e.name); hits.push({key,name:e.name,src:'master'});
      if(hits.length>=8) break;
    }
  }
  // jaego중앙 제품명도 제안 (바코드 없는 95개 우선 노출에 유용)
  for(const p of sheetProducts){
    if(hits.length>=8) break;
    if(p.name && p.name.toLowerCase().includes(q) && !seen.has(p.name)){
      seen.add(p.name); hits.push({key:U.normalize(p.barcode||''),name:p.name,src:'sheet',hasBc:!!(p.barcode&&String(p.barcode).trim())});
    }
  }
  box.innerHTML = hits.map(h=>`
    <div class="suggest-item" onclick="connectName('${esc(h.name)}','${esc(currentNorm)}')">
      <div><b>${esc(h.name)}</b><div class="muted">${h.src==='sheet'?(h.hasBc?'jaego중앙':'jaego중앙 · 바코드없음'):'내 마스터'}${h.key?' · '+esc(h.key):''}</div></div>
      <span style="color:var(--accent);font-weight:700">이 제품으로</span>
    </div>`).join('');
}

function saveNew(){
  const name = document.getElementById('new-name').value.trim();
  if(!name){ toast('제품명을 입력하세요','warn'); return; }
  master[currentNorm] = { name, extra:[], updatedAt: dateStr() };
  removeFromQueue(currentNorm);
  saveMaster();
  toast('✅ 매칭 저장: '+name,'ok');
  clearResult();
}

function saveEdit(key){
  const name = document.getElementById('edit-name').value.trim();
  if(!name){ toast('제품명을 입력하세요','warn'); return; }
  master[key].name = name; master[key].updatedAt = dateStr();
  saveMaster();
  toast('수정 저장','ok'); clearResult();
}

function addAlias(key, bc){
  if(!master[key]) return;
  if(!master[key].extra) master[key].extra=[];
  if(key!==bc && !master[key].extra.includes(bc)) master[key].extra.push(bc);
  master[key].updatedAt = dateStr();
  removeFromQueue(bc);
  saveMaster();
  toast('별칭 추가됨 → '+master[key].name,'ok'); clearResult();
}

function removeEntry(key){
  if(!confirm('이 매칭을 삭제할까요?')) return;
  delete master[key]; saveMaster(); toast('삭제됨','ok'); clearResult();
}

function addToQueue(){
  if(!queue.some(q=>q.barcode===currentNorm)){
    queue.unshift({ barcode: currentNorm, ts: dateStr() });
    saveQueue();
  }
  toast('미매칭 목록에 보관','');
  clearResult();
}
function removeFromQueue(bc){ const i=queue.findIndex(q=>q.barcode===bc); if(i>=0){queue.splice(i,1);saveQueue();} }

function clearResult(){ document.getElementById('result').innerHTML=''; }
function focusName(){ setTimeout(()=>{ const n=document.getElementById('new-name'); if(n)n.focus(); },50); }

// ═══════════════════════════════════════
// 목록 / 큐
// ═══════════════════════════════════════
function renderList(){
  const q=(document.getElementById('list-search').value||'').trim().toLowerCase();
  const rows=Object.entries(master)
    .filter(([k,e])=>!q || e.name.toLowerCase().includes(q) || k.includes(q) || (e.extra||[]).some(x=>x.includes(q)))
    .sort((a,b)=>(b[1].updatedAt||'').localeCompare(a[1].updatedAt||''));
  const body=document.getElementById('list-body');
  if(!rows.length){ body.innerHTML='<div class="empty">매칭된 제품이 없습니다.</div>'; return; }
  body.innerHTML=rows.map(([k,e])=>`
    <div class="item">
      <div style="min-width:0">
        <div class="nm">${esc(e.name)}</div>
        <div class="bc">${esc(k)}</div>
        ${(e.extra&&e.extra.length)?`<div class="extra">+별칭 ${e.extra.length}개</div>`:''}
      </div>
      <div class="item-acts">
        <button class="mini" onclick="processBarcode('${esc(k)}')">✏️</button>
        <button class="mini" onclick="removeEntry('${esc(k)}')">🗑️</button>
      </div>
    </div>`).join('');
}

function renderQueue(){
  const body=document.getElementById('queue-body');
  const noBc = sheetNoBarcode();
  let html = '';
  // jaego중앙: 이름만 있고 바코드 없는 품목 = 바코드 붙일 대상
  if(noBc.length){
    html += `<p class="muted" style="margin:4px 0 8px;font-weight:600">jaego중앙 · 바코드 필요 (${noBc.length})</p>`;
    html += noBc.map(p=>`
      <div class="q-item" onclick="startMatchFor('${esc(p.name)}')">
        <div><div class="nm" style="font-size:14px;font-weight:600">${esc(p.name)}</div><div class="tm">${esc(p.sheetName||p.sheet||'')}</div></div>
        <span style="color:var(--accent);font-weight:700">📷 바코드</span>
      </div>`).join('');
  }
  // 내가 스캔했지만 이름 안 붙인 바코드
  if(queue.length){
    html += `<p class="muted" style="margin:16px 0 8px;font-weight:600">이름 필요 (스캔한 바코드)</p>`;
    html += queue.map(q=>`
      <div class="q-item" onclick="processBarcode('${esc(q.barcode)}')">
        <div><div class="bc">${esc(q.barcode)}</div><div class="tm">${esc(q.ts)}</div></div>
        <span style="color:var(--accent);font-weight:700">매칭 →</span>
      </div>`).join('');
  }
  body.innerHTML = html || '<div class="empty">미매칭 항목이 없습니다.</div>';
}

// ═══════════════════════════════════════
// 카메라 (재사용 스캐너 모듈 사용)
// ═══════════════════════════════════════
function openCam(){
  document.getElementById('camWrap').classList.add('open');
  if(!scanner){
    scanner = BarcodeScanner.create({
      video: document.getElementById('scanner-video'),
      zoomSlider: document.getElementById('zoom-slider'),
      normalize: U.normalize,
      onScan: (code)=>{ closeCam(); processBarcode(code); },
      onError: (m)=>{ toast(m,'err'); closeCam(); },
      onStatus: (s)=>{ if(s==='unsupported') toast('이 기기는 자동 스캔 미지원. 직접 입력하세요','warn'); },
      onZoomAvailable: (ok)=>{ document.getElementById('zoom-control').style.display = ok?'flex':'none'; },
    });
  }
  scanner.start();
}
function closeCam(){
  document.getElementById('camWrap').classList.remove('open');
  document.getElementById('zoom-control').style.display='none';
  if(scanner) scanner.stop();
}

// ═══════════════════════════════════════
// 백데이터 입출력
// ═══════════════════════════════════════
function exportJSON(){
  const blob = new Blob([JSON.stringify(master,null,2)],{type:'application/json'});
  download(blob, 'barcode-master.json');
  closeMenu();
}
function exportCSV(){
  const lines=['barcode,name,extraBarcodes'];
  for(const k in master){
    const e=master[k];
    lines.push([csv(k),csv(e.name),csv((e.extra||[]).join('|'))].join(','));
  }
  download(new Blob(['﻿'+lines.join('\n')],{type:'text/csv'}),'barcode-master.csv');
  closeMenu();
}
function importJSON(file){
  if(!file) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const data=JSON.parse(r.result);
      let added=0;
      for(const k in data){
        if(!master[k]){ master[k]=data[k]; added++; }
        else { // 병합: 별칭 합치기, 이름은 기존 유지
          const ex=new Set([...(master[k].extra||[]),...(data[k].extra||[])]);
          master[k].extra=[...ex];
        }
      }
      saveMaster(); renderList();
      toast(`가져오기 완료 (+${added}건)`,'ok');
    }catch(e){ toast('JSON 파싱 실패','err'); }
    closeMenu();
  };
  r.readAsText(file);
}

// 워커/시트 URL 에서 기존 제품목록(getAll) 불러와 시드
async function importFromSheet(){
  const url=prompt('워커/시트 URL (getAll 지원)', 'https://pharmacy-proxy.asteria2hyun.workers.dev');
  if(!url) return;
  toast('불러오는 중...','');
  try{
    const data=await jsonpFetch(url.replace(/\/+$/,'')+'?action=getAll');
    if(!data||!data.success||!data.products){ toast('데이터 형식 오류','err'); return; }
    let added=0;
    for(const p of data.products){
      if(!p.barcode || !p.name) continue;
      const key=U.normalize(p.barcode);
      if(!master[key]){ master[key]={name:p.name, extra:(p.extraBarcodes||[]).slice(), updatedAt:dateStr()}; added++; }
    }
    saveMaster(); renderList();
    toast(`시트에서 ${added}건 가져옴`,'ok');
  }catch(e){ toast('불러오기 실패: '+e.message,'err'); }
  closeMenu();
}
function jsonpFetch(url){
  return new Promise((resolve,reject)=>{
    const cb='cb_'+String(Math.floor(performance.now()))+'_'+Object.keys(master).length;
    const s=document.createElement('script'); let done=false;
    const to=setTimeout(()=>{ if(done)return; done=true; cleanup(); reject(new Error('timeout')); },10000);
    function cleanup(){ delete window[cb]; if(document.head.contains(s))document.head.removeChild(s); clearTimeout(to); }
    window[cb]=(d)=>{ if(done)return; done=true; cleanup(); resolve(d); };
    s.src=url+(url.includes('?')?'&':'?')+'callback='+cb;
    s.onerror=()=>{ if(done)return; done=true; cleanup(); reject(new Error('network')); };
    document.head.appendChild(s);
  });
}

function wipeAll(){
  if(!confirm('마스터 데이터를 전부 삭제할까요? (되돌릴 수 없음)')) return;
  master={}; queue=[]; saveMaster(); saveQueue(); renderList(); renderQueue();
  toast('전체 삭제됨','ok'); closeMenu();
}

// ═══════════════════════════════════════
// 공통 유틸 / 탭 / 메뉴
// ═══════════════════════════════════════
function goTab(t){
  ['scan','list','queue'].forEach(x=>{
    document.getElementById('page-'+x).classList.toggle('show',x===t);
    document.getElementById('tab-'+x).classList.toggle('active',x===t);
  });
  if(t==='list') renderList();
  if(t==='queue') renderQueue();
}
function openMenu(){ document.getElementById('menu-mask').classList.add('open'); }
function closeMenu(){ document.getElementById('menu-mask').classList.remove('open'); }

let _tt=null;
function toast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show '+(type||'');
  clearTimeout(_tt); _tt=setTimeout(()=>t.className='toast',1800);
}
function esc(s){ return String(s==null?'':s).replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function csv(s){ s=String(s==null?'':s); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }
function download(blob,name){ const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000); }
function dateStr(){ const d=new Date(); const p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; }

updateCounts();
loadSheet();   // jaego중앙 자동 연결
</script>
